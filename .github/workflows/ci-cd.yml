name: Phoenix CI/CD Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  # 1. Code Quality Stage (Parallel)
  lint:
    name: 🛡️ Linting & Formatting
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        cache-dependency-path: |
          ./backend/package-lock.json
          ./frontend/package-lock.json
    - name: Backend Lint
      run: |
        cd backend
        npm ci
        # If backend has a lint script, run it:
        # npm run lint
    - name: Frontend Lint
      run: |
        cd frontend
        npm ci
        npm run lint

  # 2. Logic & DB Integrity Stage (Parallel)
  backend-verification:
    name: 🧠 Backend & DB Integrity
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: inventory_system_test
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: ./backend

    steps:
    - uses: actions/checkout@v4
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        cache-dependency-path: './backend/package-lock.json'
    - name: Install dependencies
      run: npm ci
    - name: Verify Migration Consistency
      run: ./node_modules/.bin/knex migrate:latest
      env:
        DB_HOST: localhost
        DB_USER: user
        DB_PASSWORD: password
        DB_NAME: inventory_system_test
    - name: Run Tests (Deduplication & Deletion Logic)
      run: npm test
      env:
        NODE_ENV: test
        DB_HOST: localhost
        DB_USER: user
        DB_PASSWORD: password
        DB_NAME: inventory_system_test

  # 3. Frontend Build Verification (Parallel)
  frontend-build:
    name: 🏗️ Frontend Build Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
    - uses: actions/checkout@v4
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        cache-dependency-path: './frontend/package-lock.json'
    - run: npm ci
    - name: Verify Production Build
      run: npm run build
    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: frontend-dist
        path: frontend/dist/

  # 4. Docker Audit (Parallel)
  docker-audit:
    name: 🐳 Docker Health Audit
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Validate Compose Config
      run: docker compose config --quiet

  # 5. Deployment Readiness (Sequential after Parallelized checks)
  deploy-readiness:
    name: 🚀 Production Readiness
    needs: [lint, backend-verification, frontend-build, docker-audit]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    steps:
    - name: All Checks Passed
      run: echo "System is stable. Ready for Windows/WSL2 production deployment."
